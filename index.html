<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Multi Stopwatch</title>

<style>
body {
  font-family: -apple-system;
  background:#f5f7fb;
  margin:0;
  padding:10px;
}

.card {
  background:#fff;
  margin:10px 0;
  padding:10px;
  border-radius:12px;
  transition: all 0.2s ease;
}

/* 🔥 視認性最強ハイライト */
.card.running {
  background: #16a34a;
  border: 3px solid #065f46;
  box-shadow: 0 0 0 3px rgba(34,197,94,0.4), 0 12px 32px rgba(0,0,0,0.25);
  transform: scale(1.02);
}

.time {
  font-size:24px;
  text-align:center;
}

/* 🔥 時間表示強調 */
.card.running .time {
  background: #022c22;
  color: #ecfdf5;
  font-weight: 900;
  padding:6px;
  border-radius:8px;
}

/* 🔥 赤バッジ */
.status {
  font-size:12px;
  padding:4px 8px;
  border-radius:8px;
  display:inline-block;
  margin-bottom:5px;
  background:#ddd;
}

.card.running .status {
  background:#ef4444;
  color:white;
}

/* 入力 */
input {
  width:100%;
  margin:5px 0;
  padding:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

.card.running input {
  border:2px solid #022c22;
}

/* ボタン */
button {
  padding:10px;
  margin:2px;
  border-radius:8px;
  border:none;
  background:#eee;
}

button:active {
  transform: scale(0.95);
}
</style>
</head>

<body>

<h2>Multi Stopwatch</h2>
<div id="app"></div>

<script>
const COUNT = 50;

let timers = JSON.parse(localStorage.getItem("timers")||"null") ||
Array.from({length:COUNT},(_,i)=>({id:i,name:"Timer "+(i+1),t:0,r:false,s:0}));

function save(){
  localStorage.setItem("timers",JSON.stringify(timers));
}

function now(){
  return Date.now();
}

function elapsed(t){
  return t.r ? t.t + (now()-t.s) : t.t;
}

function fmt(ms){
  let cs=Math.floor(ms/10)%100;
  let s=Math.floor(ms/1000)%60;
  let m=Math.floor(ms/60000)%60;
  let h=Math.floor(ms/3600000);
  return `${h}:${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}.${cs}`;
}

function render(){
  document.getElementById("app").innerHTML =
  timers.map(t=>`
    <div class="card ${t.r ? 'running' : ''}">
      <div class="status">${t.r ? 'RUNNING' : 'STOPPED'}</div>
      <div>#${t.id+1}</div>

      <input value="${t.name}"
        onchange="rename(${t.id},this.value)">

      <div class="time">${fmt(elapsed(t))}</div>

      <button onclick="start(${t.id})">Start</button>
      <button onclick="stop(${t.id})">Stop</button>
      <button onclick="reset(${t.id})">Reset</button>
    </div>
  `).join("");
}

function start(i){
  let t=timers[i];
  if(!t.r){
    t.r=true;
    t.s=now();
    save();
  }
}

function stop(i){
  let t=timers[i];
  if(t.r){
    t.t+=now()-t.s;
    t.r=false;
    save();
  }
}

function reset(i){
  timers[i]={...timers[i],t:0,r:false};
  save();
  render();
}

function rename(i,v){
  timers[i].name=v;
  save();
}

setInterval(render,100);
render();
</script>

</body>
</html>
